<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전한 치과 시술을 위한 전신질환 분석</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --border: #e2e6ec;
  --text-primary: #1a2030;
  --text-secondary: #6b7585;
  --text-muted: #9ba4b0;
  --accent: #2563eb;
  --accent-light: #eff4ff;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --warning: #d97706;
  --warning-light: #fffbeb;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}
body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; padding: 24px 16px 48px; }
.wrap { max-width: 480px; margin: 0 auto; }

.header { margin-bottom: 20px; }
.header-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.header h1 { font-size: 19px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }

/* 시술 선택 */
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.proc-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
.proc-btn {
  padding: 11px 6px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.proc-btn .picon { font-size: 20px; }
.proc-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.proc-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.proc-btn.active .psub { color: rgba(255,255,255,0.75); }
.psub { font-size: 10px; font-weight: 400; color: var(--text-muted); }

/* 탭 */
.tab-bar { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 4px; margin-bottom: 16px; gap: 2px; }
.tab-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 9px 4px; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.tab-btn .icon { font-size: 18px; line-height: 1; }
.tab-btn:hover { background: var(--bg); }
.tab-btn.active { background: var(--accent); color: #fff; }

/* 패널 */
.panel { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
.panel.active { display: block; }
.panel-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 14px; }

textarea { width: 100%; height: 120px; padding: 12px; font-family: inherit; font-size: 14px; line-height: 1.6; color: var(--text-primary); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); resize: vertical; outline: none; transition: border-color 0.15s; }
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--text-muted); }

.example-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip { padding: 4px 10px; font-size: 12px; background: var(--accent-light); color: var(--accent); border: 1px solid #c7d9ff; border-radius: 20px; cursor: pointer; transition: background 0.12s; font-family: inherit; }
.chip:hover { background: #dce8ff; }

.file-drop { border: 1.5px dashed var(--border); border-radius: var(--radius-sm); padding: 28px 20px; text-align: center; background: var(--bg); cursor: pointer; transition: all 0.15s; position: relative; }
.file-drop:hover { border-color: var(--accent); background: var(--accent-light); }
.file-drop.has-file { border-color: var(--success); background: var(--success-light); }
.file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.file-icon { font-size: 26px; margin-bottom: 8px; }
.file-drop-text { font-size: 13px; color: var(--text-secondary); }
.file-drop-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.file-name { font-size: 13px; font-weight: 500; color: var(--success); margin-top: 6px; }

.camera-area { border-radius: var(--radius-sm); overflow: hidden; background: #000; position: relative; aspect-ratio: 4/3; margin-bottom: 12px; }
video { width: 100%; height: 100%; object-fit: cover; display: block; }
.camera-placeholder { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 13px; gap: 8px; min-height: 180px; background: #111; }
.cam-icon { font-size: 32px; opacity: 0.5; }

.btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4fd8; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--bg); }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }

.progress-wrap { display: none; align-items: center; gap: 10px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); margin-bottom: 12px; }
.progress-wrap.show { display: flex; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-text { font-size: 13px; color: var(--text-secondary); }

/* 결과 카드 */
.result-card { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.result-card.show { display: block; }

.result-header { padding: 14px 20px; border-bottom: 1px solid var(--border); }
.result-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.risk-badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.04em; white-space: nowrap; }
.risk-high { background: var(--danger-light); color: var(--danger); }
.risk-mid { background: var(--warning-light); color: var(--warning); }
.risk-low { background: var(--success-light); color: var(--success); }
.result-title { font-size: 15px; font-weight: 600; flex: 1; }

/* 판단 근거 태그 */
.reason-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
.reason-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.reason-danger { background: var(--danger-light); color: var(--danger); }
.reason-warning { background: var(--warning-light); color: var(--warning); }
.reason-info { background: var(--accent-light); color: var(--accent); }

.result-body { padding: 16px 20px; }

/* 시술별 판단 */
.proc-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.proc-result-box { border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; border: 1px solid var(--border); }
.proc-result-name { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
.proc-result-verdict { font-size: 13px; font-weight: 700; }
.verdict-ok { color: var(--success); }
.verdict-caution { color: var(--warning); }
.verdict-defer { color: var(--danger); }
.proc-result-box.highlighted { border-width: 2px; }
.proc-result-box.highlight-ok { border-color: var(--success); background: var(--success-light); }
.proc-result-box.highlight-caution { border-color: var(--warning); background: var(--warning-light); }
.proc-result-box.highlight-defer { border-color: var(--danger); background: var(--danger-light); }

.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; }
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-value { font-size: 15px; font-weight: 600; }

.notes-section { margin-top: 4px; }
.notes-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.note-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-primary); line-height: 1.5; }
.note-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.dot-danger { background: var(--danger); }
.dot-warning { background: var(--warning); }
.dot-info { background: var(--accent); }
.note-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.no-notes { font-size: 13px; color: var(--text-muted); padding: 8px 0; border-top: 1px solid var(--border); }

.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }
.text-success { color: var(--success); }

.reset-btn { margin-top: 12px; width: 100%; padding: 10px; border: none; background: none; font-family: inherit; font-size: 13px; color: var(--text-muted); cursor: pointer; border-radius: var(--radius-sm); transition: color 0.12s; }
.reset-btn:hover { color: var(--danger); }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-label">안전한 치과 시술을 위한</div>
    <h1>전신질환 정보 분석</h1>
  </div>

  <!-- 시술 선택 -->
  <div class="section-label">시술 선택</div>
  <div class="proc-bar">
    <button class="proc-btn active" id="proc-발치" onclick="selectProc('발치', this)">
      <span class="picon">🦷</span>
      발치
      <span class="psub">단순 · 외과적</span>
    </button>
    <button class="proc-btn" id="proc-임플란트" onclick="selectProc('임플란트', this)">
      <span class="picon">🔩</span>
      임플란트
      <span class="psub">식립 · 골이식</span>
    </button>
    <button class="proc-btn" id="proc-일반치료" onclick="selectProc('일반치료', this)">
      <span class="picon">🔧</span>
      일반치료
      <span class="psub">충치 · 스케일링</span>
    </button>
  </div>

  <!-- 입력 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('text', this)">
      <span class="icon">✏️</span>직접 입력
    </button>
    <button class="tab-btn" onclick="switchTab('file', this)">
      <span class="icon">📄</span>파일 첨부
    </button>
    <button class="tab-btn" onclick="switchTab('camera', this)">
      <span class="icon">📷</span>촬영
    </button>
  </div>

  <div class="panel active" id="panel-text">
    <div class="panel-title">검사결과 · 복용약 · 병력 입력</div>
    <textarea id="textInput" placeholder="예) INR 2.8, PLT 80000, aspirin, DM, warfarin, stent"></textarea>
    <div class="example-chips">
      <button class="chip" onclick="appendChip('INR 2.5')">INR 2.5</button>
      <button class="chip" onclick="appendChip('PLT 80000')">PLT 80k</button>
      <button class="chip" onclick="appendChip('WBC 1800')">WBC↓</button>
      <button class="chip" onclick="appendChip('aspirin')">Aspirin</button>
      <button class="chip" onclick="appendChip('warfarin')">Warfarin</button>
      <button class="chip" onclick="appendChip('apixaban')">Apixaban</button>
      <button class="chip" onclick="appendChip('clopidogrel')">Plavix</button>
      <button class="chip" onclick="appendChip('DM HbA1c 8.5')">DM</button>
      <button class="chip" onclick="appendChip('stent')">Stent</button>
      <button class="chip" onclick="appendChip('atrial fibrillation')">AF</button>
      <button class="chip" onclick="appendChip('heart failure')">심부전</button>
      <button class="chip" onclick="appendChip('CKD')">CKD</button>
      <button class="chip" onclick="appendChip('dialysis')">투석</button>
      <button class="chip" onclick="appendChip('bisphosphonate')">비스포스포네이트</button>
      <button class="chip" onclick="appendChip('denosumab')">데노수맙</button>
      <button class="chip" onclick="appendChip('osteoporosis')">골다공증</button>
      <button class="chip" onclick="appendChip('radiation')">방사선</button>
      <button class="chip" onclick="appendChip('MRONJ')">MRONJ</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary" onclick="runText()">분석 시작</button>
  </div>

  <div class="panel" id="panel-file">
    <div class="panel-title">검사결과지 이미지 · PDF 첨부</div>
    <div class="file-drop" id="fileDrop">
      <input type="file" id="fileInput" accept="image/*,.pdf" onchange="onFileSelect(this)">
      <div class="file-icon">📂</div>
      <div class="file-drop-text">파일을 선택하거나 여기에 드래그</div>
      <div class="file-drop-sub">JPG, PNG, PDF 지원</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary" id="fileAnalyzeBtn" onclick="runFile()" disabled>분석 시작</button>
  </div>

  <div class="panel" id="panel-camera">
    <div class="panel-title">검사결과지 촬영</div>
    <div class="camera-area">
      <video id="video" autoplay playsinline></video>
      <div class="camera-placeholder" id="cameraPlaceholder">
        <div class="cam-icon">📷</div>
        <span>카메라를 시작해주세요</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="startCamera()">카메라 시작</button>
      <button class="btn btn-primary" onclick="capture()">촬영 및 분석</button>
    </div>
  </div>

  <div class="progress-wrap" id="progress">
    <div class="spinner"></div>
    <div class="progress-text" id="progressText">분석 중...</div>
  </div>

  <!-- 결과 카드 -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-header-top">
        <span class="risk-badge" id="riskBadge">—</span>
        <span class="result-title" id="riskTitle">—</span>
      </div>
      <div class="reason-row" id="reasonRow"></div>
    </div>
    <div class="result-body">

      <!-- 시술별 판단 -->
      <div class="notes-label" style="margin-bottom:10px;">시술별 판단</div>
      <div class="proc-results">
        <div class="proc-result-box" id="pr-발치">
          <div class="proc-result-name">🦷 발치</div>
          <div class="proc-result-verdict" id="pv-발치">—</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:3px;" id="pm-발치"></div>
        </div>
        <div class="proc-result-box" id="pr-임플란트">
          <div class="proc-result-name">🔩 임플란트</div>
          <div class="proc-result-verdict" id="pv-임플란트">—</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:3px;" id="pm-임플란트"></div>
        </div>
        <div class="proc-result-box" id="pr-일반치료">
          <div class="proc-result-name">🔧 일반치료</div>
          <div class="proc-result-verdict" id="pv-일반치료">—</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:3px;" id="pm-일반치료"></div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-label">선택 시술</div>
          <div class="stat-value" id="statProcedure">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">약물 조절</div>
          <div class="stat-value" id="statDrug">—</div>
        </div>
      </div>

      <div class="notes-section">
        <div class="notes-label">항목별 주의사항</div>
        <div id="notesList"></div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetResult()">초기화</button>
  </div>

</div>

<script>
let camStream = null;
let selectedProc = '발치';

function selectProc(proc, el) {
  selectedProc = proc;
  document.querySelectorAll('.proc-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function switchTab(id, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
  if (id === 'camera') startCamera(); else stopCamera();
}

function startCamera() {
  const ph = document.getElementById('cameraPlaceholder');
  const v = document.getElementById('video');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      camStream = stream;
      v.srcObject = stream;
      v.style.display = 'block';
      ph.style.display = 'none';
    })
    .catch(() => { ph.style.display = 'flex'; });
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
}

function appendChip(val) {
  const ta = document.getElementById('textInput');
  ta.value = ta.value ? ta.value + ', ' + val : val;
  ta.focus();
}

function onFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('fileDrop').classList.add('has-file');
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileAnalyzeBtn').disabled = false;
}

function showProgress(msg) {
  document.getElementById('progress').classList.add('show');
  document.getElementById('progressText').textContent = msg || '분석 중...';
}

function hideProgress() {
  document.getElementById('progress').classList.remove('show');
}

function extract(text, regex) {
  const m = text.match(regex);
  return m ? parseFloat(m[1]) : null;
}

/* ── 분석 핵심 ── */
function analyze(rawText) {
  const text = rawText.toLowerCase();

  // 수치 추출
  const inr = extract(text, /inr[^0-9]*([0-9.]+)/i);
  const plt = extract(text, /(?:plt|platelet)[^0-9]*([0-9]+)/i);
  const wbc = extract(text, /wbc[^0-9]*([0-9]+)/i);
  const hba1c = extract(text, /hba1c[^0-9]*([0-9.]+)/i);

  // 약물 · 병력 플래그
  const hasAspirin    = /aspirin|아스피린/.test(text);
  const hasPlavix     = /plavix|clopidogrel|클로피도그렐/.test(text);
  const hasWarfarin   = /warfarin|와파린/.test(text);
  const hasNOAC       = /apixaban|rivaroxaban|dabigatran|edoxaban|엘리퀴스|자렐토/.test(text);
  const hasDM         = /\bdm\b|diabetes|당뇨/.test(text);
  // 심혈관
  const hasStent      = /stent|스텐트/.test(text);
  const hasMI         = /\bmi\b|심근경색|myocardial infarction/.test(text);
  const hasHF         = /heart failure|심부전|cardiac failure/.test(text);
  const hasAF         = /\baf\b|atrial fibrillation|심방세동/.test(text);
  const hasHTN        = /hypertension|고혈압|\bhtn\b/.test(text);
  // 신장
  const hasCKD        = /\bckd\b|chronic kidney|신부전|만성신장/.test(text);
  const hasDialysis   = /dialysis|투석|혈액투석|복막투석/.test(text);
  const hasKidneyTx   = /kidney transplant|신장이식|renal transplant/.test(text);
  // 간
  const hasLiver      = /liver|간경화|cirrhosis|hepatic/.test(text);
  // 골대사 · 약물관련 악골괴사
  const hasBP         = /bisphosphonate|zoledronate|alendronate|risedronate|ibandronate|비스포스포네이트|포사맥스|악토넬/.test(text);
  const hasDenosumab  = /denosumab|프롤리아|xgeva|엑스지바/.test(text);
  const hasSunitinib  = /sunitinib|sorafenib|bevacizumab|antiangiogenic|항혈관신생/.test(text); // MRONJ 위험 약물
  const hasMRONJ      = /mronj|bronj|약물관련 악골괴사|bisphosphonate related osteonecrosis/.test(text); // 이미 진단된 경우
  const hasOsteo      = /osteoporosis|골다공증/.test(text);
  // 방사선·종양
  const hasRadiation  = /radiation|방사선|osti\b|osteoradionecrosis|방사선골괴사/.test(text);
  const hasORN        = /\born\b|osteoradionecrosis|방사선골괴사/.test(text);
  // 면역
  const hasImmunosupp = /steroid|tacrolimus|mycophenolate|cyclosporine|면역억제|azathioprine/.test(text);
  const hasChemo      = /chemotherapy|항암|chemo/.test(text);
  // 기타
  const hasHTNdrug    = /amlodipine|losartan|ramipril|고혈압약|antihypertensive/.test(text);

  // ── 위험도 판단 근거 수집 ──
  const reasons = []; // { label, level: 'danger'|'warning'|'info' }

  if (inr !== null) {
    if (inr > 3.5)      reasons.push({ label: 'INR ' + inr + ' ↑↑', level: 'danger' });
    else if (inr > 3.0) reasons.push({ label: 'INR ' + inr + ' ↑', level: 'warning' });
    else                reasons.push({ label: 'INR ' + inr, level: 'info' });
  }
  if (plt !== null) {
    if (plt < 50000)       reasons.push({ label: 'PLT ' + (plt/1000).toFixed(0) + 'k ↓↓', level: 'danger' });
    else if (plt < 100000) reasons.push({ label: 'PLT ' + (plt/1000).toFixed(0) + 'k ↓', level: 'warning' });
    else                   reasons.push({ label: 'PLT ' + (plt/1000).toFixed(0) + 'k', level: 'info' });
  }
  if (wbc !== null && wbc < 2000) reasons.push({ label: 'WBC ' + wbc + ' ↓↓', level: 'danger' });
  if (hasWarfarin)   reasons.push({ label: '와파린', level: 'warning' });
  if (hasNOAC)       reasons.push({ label: 'NOAC', level: 'warning' });
  if (hasAspirin)    reasons.push({ label: '아스피린', level: 'info' });
  if (hasPlavix)     reasons.push({ label: '클로피도그렐', level: 'warning' });
  if (hasMRONJ)      reasons.push({ label: 'MRONJ 기왕력', level: 'danger' });
  if (hasBP)         reasons.push({ label: '비스포스포네이트', level: 'warning' });
  if (hasDenosumab)  reasons.push({ label: '데노수맙', level: 'warning' });
  if (hasSunitinib)  reasons.push({ label: '항혈관신생약', level: 'warning' });
  if (hasORN)        reasons.push({ label: 'ORN 기왕력', level: 'danger' });
  else if (hasRadiation) reasons.push({ label: '방사선치료력', level: 'danger' });
  if (hasOsteo)      reasons.push({ label: '골다공증', level: 'info' });
  if (hasDM)         reasons.push({ label: '당뇨', level: 'info' });
  if (hasStent)      reasons.push({ label: '스텐트', level: 'warning' });
  if (hasMI)         reasons.push({ label: '심근경색', level: 'warning' });
  if (hasAF)         reasons.push({ label: '심방세동', level: 'warning' });
  if (hasHF)         reasons.push({ label: '심부전', level: 'warning' });
  if (hasDialysis)   reasons.push({ label: '투석', level: 'danger' });
  else if (hasCKD)   reasons.push({ label: '만성신장질환', level: 'warning' });
  if (hasKidneyTx)   reasons.push({ label: '신장이식', level: 'warning' });
  if (hasLiver)      reasons.push({ label: '간경화', level: 'danger' });
  if (hasImmunosupp) reasons.push({ label: '면역억제', level: 'warning' });
  if (hasChemo)      reasons.push({ label: '항암치료', level: 'danger' });

  // ── 전체 출혈 위험도 ──
  let bleedRisk = '낮음';
  if (
    (inr !== null && inr > 3.5) ||
    (plt !== null && plt < 50000) ||
    hasLiver || hasRadiation || hasDialysis || hasChemo ||
    (wbc !== null && wbc < 2000)
  ) bleedRisk = '높음';
  else if (
    (inr !== null && inr > 3.0) ||
    (plt !== null && plt < 100000) ||
    hasWarfarin || hasNOAC || hasPlavix ||
    hasCKD || hasKidneyTx || hasHF || hasImmunosupp
  ) bleedRisk = '중등도';

  // ── 약물 조절 ──
  let drugAdj = '없음';
  if (hasWarfarin) drugAdj = 'INR 기준 판단';
  else if (hasNOAC) drugAdj = '복용 타이밍 조절';
  else if (hasPlavix && hasAspirin) drugAdj = '심혈관과 협진';
  else if (hasAspirin || hasPlavix) drugAdj = '유지 (지혈 주의)';

  // ── 시술별 판단 ──
  const flags = { inr, plt, wbc, hba1c, hasAspirin, hasPlavix, hasWarfarin, hasNOAC, hasDM, hasStent, hasMI, hasHF, hasAF, hasCKD, hasDialysis, hasKidneyTx, hasLiver, hasBP, hasDenosumab, hasSunitinib, hasMRONJ, hasOsteo, hasRadiation, hasORN, hasImmunosupp, hasChemo };
  const procJudge = {
    '발치':     judgeExtraction(flags),
    '임플란트': judgeImplant(flags),
    '일반치료': judgeRoutine(flags),
  };

  // ── 주의사항 노트 ──
  const notes = buildNotes(flags);

  renderResult(bleedRisk, drugAdj, procJudge, reasons, notes);
}

function judgeExtraction(f) {
  const { inr, plt, wbc, hasWarfarin, hasNOAC, hasAspirin, hasPlavix, hasLiver, hasCKD, hasDialysis, hasKidneyTx, hasRadiation, hasORN, hasMRONJ, hasBP, hasDenosumab, hasSunitinib, hasChemo, hasImmunosupp, hasHF } = f;
  // 절대 금기
  if (hasORN || hasMRONJ) return { v: 'defer', msg: 'ORN/MRONJ — 전문의 의뢰' };
  if (hasRadiation) return { v: 'defer', msg: 'ORNI 위험 — 원칙적 금기' };
  if ((inr && inr > 3.5) || (plt && plt < 50000) || hasLiver || hasChemo)
    return { v: 'defer', msg: '시술 연기' };
  if (hasDialysis) return { v: 'caution', msg: '투석 후 시술 권장' };
  // 주의
  if ((inr && inr > 3.0) || (plt && plt < 100000) || (wbc && wbc < 2000))
    return { v: 'caution', msg: '주의 후 가능' };
  if (hasWarfarin || hasNOAC) return { v: 'caution', msg: '약물 조절 후 가능' };
  if (hasAspirin && hasPlavix) return { v: 'caution', msg: '협진 후 결정' };
  if (hasBP || hasDenosumab || hasSunitinib) return { v: 'caution', msg: 'MRONJ 위험 고지 필수' };
  if (hasCKD || hasKidneyTx || hasHF || hasImmunosupp) return { v: 'caution', msg: '주의 후 가능' };
  return { v: 'ok', msg: '가능' };
}

function judgeImplant(f) {
  const { inr, plt, wbc, hasWarfarin, hasNOAC, hasAspirin, hasPlavix, hasLiver, hasCKD, hasDialysis, hasKidneyTx, hasRadiation, hasORN, hasMRONJ, hasBP, hasDenosumab, hasSunitinib, hasChemo, hasImmunosupp, hasOsteo, hasDM, hba1c, hasHF } = f;
  // 절대 금기
  if (hasORN || hasMRONJ) return { v: 'defer', msg: 'MRONJ/ORN — 절대 금기' };
  if (hasRadiation) return { v: 'defer', msg: 'ORNI 위험 — 절대 금기' };
  if (hasBP || hasDenosumab || hasSunitinib) return { v: 'defer', msg: 'MRONJ 고위험 — 연기' };
  if (hasChemo) return { v: 'defer', msg: '항암 중 — 연기' };
  if ((inr && inr > 3.0) || (plt && plt < 100000) || (wbc && wbc < 2000) || hasLiver)
    return { v: 'defer', msg: '시술 연기' };
  if (hasDialysis) return { v: 'defer', msg: '투석 환자 — 연기 권장' };
  // 주의
  if (hasImmunosupp || hasKidneyTx) return { v: 'caution', msg: '면역 억제 — 신중 결정' };
  if (hasWarfarin || hasNOAC || (hasAspirin && hasPlavix)) return { v: 'caution', msg: '약물 조절 후 조건부' };
  if (hasCKD) return { v: 'caution', msg: 'CKD — 골질·출혈 평가 필요' };
  if (hasHF) return { v: 'caution', msg: '심부전 — 마취 위험 평가' };
  if (hasDM && hba1c && hba1c > 9) return { v: 'caution', msg: 'HbA1c 높음 — 혈당 조절 후' };
  if (hasOsteo) return { v: 'caution', msg: '골밀도 평가 필요' };
  return { v: 'ok', msg: '가능' };
}

function judgeRoutine(f) {
  const { inr, plt, wbc, hasLiver, hasCKD, hasDialysis, hasChemo, hasImmunosupp, hasHTN } = f;
  if (hasChemo || (wbc && wbc < 1500)) return { v: 'caution', msg: '감염 위험 — 항생제 고려' };
  if (hasLiver || hasDialysis) return { v: 'caution', msg: '지혈·감염 주의' };
  if ((inr && inr > 3.5) || (plt && plt < 50000)) return { v: 'caution', msg: '지혈 주의' };
  return { v: 'ok', msg: '가능' };
}

function buildNotes(f) {
  const { inr, plt, wbc, hba1c, hasAspirin, hasPlavix, hasWarfarin, hasNOAC, hasDM, hasStent, hasMI, hasHF, hasAF, hasCKD, hasDialysis, hasKidneyTx, hasLiver, hasBP, hasDenosumab, hasSunitinib, hasMRONJ, hasOsteo, hasRadiation, hasORN, hasImmunosupp, hasChemo } = f;
  const n = [];

  // 혈액수치
  if (inr !== null) {
    if (inr > 3.5) n.push({ text: 'INR ' + inr + ' — 출혈 위험 매우 높음. 항응고 재조절 후 재평가', sub: '발치·임플란트 연기 필수', level: 'danger' });
    else if (inr > 3.0) n.push({ text: 'INR ' + inr + ' — 지혈 주의. 국소 지혈제 준비 필수', sub: '발치 주의, 임플란트 연기 고려', level: 'warning' });
    else n.push({ text: 'INR ' + inr + ' — 허용 범위 내', sub: '', level: 'info' });
  }
  if (plt !== null) {
    if (plt < 50000) n.push({ text: '혈소판 ' + plt.toLocaleString() + '/μL — 심각한 감소', sub: '혈액내과 협진 후 수혈 고려. 모든 외과적 시술 연기', level: 'danger' });
    else if (plt < 100000) n.push({ text: '혈소판 ' + plt.toLocaleString() + '/μL — 경도 감소', sub: '국소 지혈제·봉합 철저히', level: 'warning' });
  }
  if (wbc !== null && wbc < 2000) n.push({ text: 'WBC ' + wbc.toLocaleString() + '/μL — 면역 저하', sub: '예방적 항생제 투여 필수, 감염 시 즉각 대응', level: 'danger' });

  // 항응고·항혈소판
  if (hasWarfarin) n.push({ text: '와파린 복용 중 — INR 수치 필수 확인', sub: 'INR 2.0 이하: 발치 가능 / 2.5–3.0: 지혈 처치 강화 / 3.0 초과: 연기', level: 'warning' });
  if (hasNOAC) n.push({ text: 'NOAC 복용 중 — 마지막 복용 후 최소 12–24h 이후 시술', sub: '발치: 12h 중단 / 임플란트: 24h 이상 중단 고려. 신기능 확인 필요', level: 'warning' });
  if (hasAspirin && hasPlavix) n.push({ text: '이중 항혈소판 (아스피린 + 클로피도그렐) — 심혈관내과 협진 필수', sub: '스텐트 삽입 후 12개월 이내 절대 중단 금지. 이중 유지 상태로 시술 시 지혈 계획 필수', level: 'danger' });
  else if (hasPlavix) n.push({ text: '클로피도그렐 단독 — 중단 위험성 개별 평가 필요', sub: '심혈관내과 협진 권장. 유지 원칙이나 시술 규모·위험도에 따라 조정', level: 'warning' });
  else if (hasAspirin) n.push({ text: '아스피린 단독 — 원칙적으로 유지하며 시술', sub: '저용량 아스피린 중단 시 혈전 위험 > 출혈 위험. 지혈 철저히', level: 'info' });

  // 심방세동
  if (hasAF) n.push({ text: '심방세동 — 항응고제 복용 여부 확인 필수', sub: '와파린·NOAC 복용 가능성 높음. INR 또는 NOAC 종류·마지막 복용 확인', level: 'warning' });

  // 심혈관 시술력
  if (hasStent || hasMI) {
    const detail = hasStent ? '스텐트 삽입' : '심근경색';
    n.push({ text: detail + ' 기왕력 — 항혈소판제 중단 위험성 높음', sub: '심혈관내과 협진 후 시술 결정. 시술 시기·약물 유지 여부 반드시 확인', level: 'warning' });
  }
  if (hasHF) n.push({ text: '심부전 — 장시간 시술 시 마취 위험 증가', sub: '임플란트·외과적 발치 전 심장 전문의 평가 권장. 앙와위 자세 주의', level: 'warning' });

  // 신장
  if (hasDialysis) n.push({ text: '투석 환자 — 투석 후 다음 날 시술 권장 (헤파린 효과 소실)', sub: '출혈 경향 증가, 혈소판 기능 저하, 감염 취약. 예방적 항생제 필수\n동정맥루(AVF) 측정·혈압계 착용 금지', level: 'danger' });
  else if (hasKidneyTx) n.push({ text: '신장이식 환자 — 면역억제제 복용으로 감염 위험 높음', sub: '예방적 항생제 필수. 신기능에 따른 약물 용량 조절 필요. 이식 후 안정기 여부 확인', level: 'warning' });
  else if (hasCKD) n.push({ text: '만성신장질환 (CKD) — 출혈 경향·약물 대사 저하', sub: 'NSAIDs 금기 또는 최소화. NOAC 신기능 보정 필요. 중증(eGFR<30) 시 외과적 시술 전 신장내과 협진', level: 'warning' });

  // 간
  if (hasLiver) n.push({ text: '간경화 — 응고인자 감소, 혈소판 감소 동반 가능', sub: 'PT/INR, 혈소판 수치 사전 확인 필수. Child-Pugh C: 선택적 시술 금기 고려', level: 'danger' });

  // 당뇨
  if (hasDM) {
    const hba = hba1c ? ' (HbA1c ' + hba1c + '%)' : '';
    const subMsg = hba1c && hba1c > 9
      ? 'HbA1c > 9%: 임플란트·외과적 발치 연기 권장. 공복혈당 조절 후 재평가'
      : '공복혈당·HbA1c 확인. 창상 치유 지연 가능, 예방적 항생제 고려';
    n.push({ text: '당뇨' + hba + ' — 감염·창상 치유 위험 증가', sub: subMsg, level: 'warning' });
  }

  // 면역억제·항암
  if (hasChemo) n.push({ text: '항암 치료 중 — 면역 극도 저하, 혈소판·WBC 확인 필수', sub: '항암 완료 후 최소 3–6개월 후 외과적 시술 권장. 혈액종양내과 협진', level: 'danger' });
  else if (hasImmunosupp) n.push({ text: '면역억제제 복용 — 감염 위험 증가, 창상 치유 저하', sub: '예방적 항생제 필수. 임플란트는 이식 장기 안정기·용량 최소화 상태에서 신중 결정', level: 'warning' });

  // 골괴사 관련 약물
  if (hasMRONJ) n.push({ text: 'MRONJ(약물관련 악골괴사) 기왕력 — 구강외과 전문의 의뢰 필수', sub: '발치 포함 모든 외과적 시술 금기에 준함. 보존적 치료 우선', level: 'danger' });
  if (hasORN) n.push({ text: 'ORN(방사선 골괴사) 기왕력 — 발치·임플란트 원칙적 금기', sub: '고압산소치료(HBO) 전후 프로토콜 적용 고려. 방사선종양학과 협진', level: 'danger' });
  else if (hasRadiation) n.push({ text: '두경부 방사선 치료력 — ORN 위험 높음', sub: '발치: 방사선 조사 후 최소 6개월–1년 대기 권장. 임플란트: 고위험, 전문 센터에서만 시행\n방사선량·부위·기간 확인 필수', level: 'danger' });

  if (hasBP) n.push({ text: '비스포스포네이트 복용 — MRONJ 위험', sub: '경구제(포사맥스 등): 3년 미만 저위험이나 고지 동의 필수 / 정맥제(졸레드론산): 고위험, 임플란트 금기\n"약물 휴약(drug holiday)" 효과 불분명 — 중단 후에도 위험 지속', level: 'warning' });
  if (hasDenosumab) n.push({ text: '데노수맙 (프롤리아/엑스지바) — MRONJ 위험', sub: '엑스지바(고용량, 암 적응증): 임플란트 금기. 프롤리아(골다공증): 발치 전 전문의 협진\n와파린과 달리 중단해도 효과 즉시 소실되지 않음', level: 'warning' });
  if (hasSunitinib) n.push({ text: '항혈관신생 치료제 복용 — MRONJ 위험 인자', sub: '베바시주맙·수니티닙 등: 골수 혈류 감소로 악골괴사 유발 가능. 발치·임플란트 신중 결정', level: 'warning' });
  if (hasOsteo && !hasBP && !hasDenosumab) n.push({ text: '골다공증 — 임플란트 골유착 저하 가능', sub: '골밀도 검사(DEXA) 확인 권장. 약물 복용 여부(비스포스포네이트·데노수맙) 반드시 확인', level: 'info' });

  return n;
}

function renderResult(bleedRisk, drugAdj, procJudge, reasons, notes) {
  hideProgress();

  const riskMap = {
    '높음':  { cls: 'risk-high', label: '고위험', title: '출혈 고위험 — 시술 재검토 필요' },
    '중등도':{ cls: 'risk-mid',  label: '중등도', title: '중등도 위험 — 주의하여 진행' },
    '낮음':  { cls: 'risk-low',  label: '저위험', title: '출혈 위험 낮음 — 진행 가능' },
  };
  const risk = riskMap[bleedRisk];

  document.getElementById('riskBadge').className = 'risk-badge ' + risk.cls;
  document.getElementById('riskBadge').textContent = risk.label;
  document.getElementById('riskTitle').textContent = risk.title;

  // 판단 근거 태그
  document.getElementById('reasonRow').innerHTML = reasons.map(r =>
    `<span class="reason-tag reason-${r.level}">${r.label}</span>`
  ).join('');

  // 시술별 판단
  const verdictLabel = { ok: '가능', caution: '주의', defer: '연기' };
  const verdictCls   = { ok: 'verdict-ok', caution: 'verdict-caution', defer: 'verdict-defer' };
  const highlightCls = { ok: 'highlight-ok', caution: 'highlight-caution', defer: 'highlight-defer' };
  ['발치', '임플란트', '일반치료'].forEach(p => {
    const j = procJudge[p];
    document.getElementById('pv-' + p).textContent = j.msg;
    document.getElementById('pv-' + p).className = 'proc-result-verdict ' + verdictCls[j.v];
    const box = document.getElementById('pr-' + p);
    box.className = 'proc-result-box';
    if (p === selectedProc) {
      box.classList.add('highlighted', highlightCls[j.v]);
    }
  });

  // 선택 시술 표시
  const selJ = procJudge[selectedProc];
  const procEl = document.getElementById('statProcedure');
  procEl.textContent = selectedProc + ' — ' + selJ.msg;
  procEl.className = 'stat-value ' + (selJ.v === 'ok' ? 'text-success' : selJ.v === 'defer' ? 'text-danger' : 'text-warning');

  const drugEl = document.getElementById('statDrug');
  drugEl.textContent = drugAdj;
  drugEl.className = 'stat-value ' + (drugAdj === '없음' ? 'text-success' : 'text-warning');

  // 주의사항
  const list = document.getElementById('notesList');
  if (notes.length === 0) {
    list.innerHTML = '<div class="no-notes">특이사항 없음</div>';
  } else {
    list.innerHTML = notes.map(n => `
      <div class="note-item">
        <div class="note-dot dot-${n.level}"></div>
        <div>
          <div>${n.text}</div>
          ${n.sub ? '<div class="note-sub">' + n.sub + '</div>' : ''}
        </div>
      </div>`).join('');
  }

  const card = document.getElementById('resultCard');
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function runText() {
  const val = document.getElementById('textInput').value.trim();
  if (!val) { alert('정보를 입력해주세요.'); return; }
  showProgress('분석 중...');
  setTimeout(() => analyze(val), 100);
}

function runFile() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert('파일을 선택해주세요.'); return; }
  showProgress('OCR 처리 중...');
  Tesseract.recognize(file, 'eng+kor', {
    logger: m => {
      if (m.status === 'recognizing text')
        document.getElementById('progressText').textContent = 'OCR 인식 중 ' + Math.round(m.progress * 100) + '%';
    }
  }).then(({ data: { text } }) => analyze(text));
}

function capture() {
  const video = document.getElementById('video');
  if (!video.srcObject) { alert('카메라를 먼저 시작해주세요.'); return; }
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  showProgress('촬영 이미지 분석 중...');
  Tesseract.recognize(canvas, 'eng+kor', {
    logger: m => {
      if (m.status === 'recognizing text')
        document.getElementById('progressText').textContent = 'OCR 인식 중 ' + Math.round(m.progress * 100) + '%';
    }
  }).then(({ data: { text } }) => analyze(text));
}

function resetResult() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('textInput').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('fileName').textContent = '';
  document.getElementById('fileDrop').classList.remove('has-file');
  document.getElementById('fileAnalyzeBtn').disabled = true;
}
</script>
</body>
</html>
