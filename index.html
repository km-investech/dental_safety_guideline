<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전신질환 정보 분석 — 나은치과</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --border: #e2e6ec;
  --text-primary: #1a2030;
  --text-secondary: #6b7585;
  --text-muted: #9ba4b0;
  --accent: #2563eb;
  --accent-light: #eff4ff;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --warning: #d97706;
  --warning-light: #fffbeb;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 24px 16px 48px;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
}

.header {
  margin-bottom: 24px;
}

.header-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
}

.tab-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 16px;
  gap: 2px;
}

.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 9px 4px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.tab-btn .icon {
  font-size: 18px;
  line-height: 1;
}

.tab-btn:hover { background: var(--bg); }

.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

.panel {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
}

.panel.active { display: block; }

.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 14px;
}

textarea {
  width: 100%;
  height: 130px;
  padding: 12px;
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}

textarea:focus { border-color: var(--accent); }

textarea::placeholder { color: var(--text-muted); }

.example-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.chip {
  padding: 4px 10px;
  font-size: 12px;
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid #c7d9ff;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.12s;
  font-family: inherit;
}

.chip:hover { background: #dce8ff; }

.file-drop {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 32px 20px;
  text-align: center;
  background: var(--bg);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.file-drop:hover { border-color: var(--accent); background: var(--accent-light); }

.file-drop.has-file { border-color: var(--success); background: var(--success-light); }

.file-drop input[type="file"] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

.file-icon { font-size: 28px; margin-bottom: 8px; }

.file-drop-text { font-size: 13px; color: var(--text-secondary); }

.file-drop-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

.file-name { font-size: 13px; font-weight: 500; color: var(--success); margin-top: 6px; }

.camera-area {
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: #000;
  position: relative;
  aspect-ratio: 4/3;
  margin-bottom: 12px;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.camera-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  gap: 8px;
  min-height: 180px;
  background: #111;
}

.cam-icon { font-size: 32px; opacity: 0.5; }

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover { background: #1d4fd8; }
.btn-primary:active { transform: scale(0.98); }

.btn-primary:disabled {
  background: var(--border);
  color: var(--text-muted);
  cursor: not-allowed;
}

.btn-outline {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-outline:hover { background: var(--bg); }

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.progress-wrap {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}

.progress-wrap.show { display: flex; }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.progress-text { font-size: 13px; color: var(--text-secondary); }

.result-card {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.result-card.show { display: block; }

.result-header {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.risk-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

.risk-high { background: var(--danger-light); color: var(--danger); }
.risk-mid { background: var(--warning-light); color: var(--warning); }
.risk-low { background: var(--success-light); color: var(--success); }

.result-title {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
}

.result-body { padding: 16px 20px; }

.stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.stat-box {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 12px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.stat-value {
  font-size: 15px;
  font-weight: 600;
}

.notes-section { margin-top: 4px; }

.notes-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.note-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 0;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.5;
}

.note-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
  background: var(--accent);
}

.no-notes {
  font-size: 13px;
  color: var(--text-muted);
  padding: 8px 0;
  border-top: 1px solid var(--border);
}

.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }
.text-success { color: var(--success); }
.text-accent { color: var(--accent); }

.reset-btn {
  margin-top: 12px;
  width: 100%;
  padding: 10px;
  border: none;
  background: none;
  font-family: inherit;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: color 0.12s;
}

.reset-btn:hover { color: var(--danger); }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-label">나은치과</div>
    <h1>전신질환 정보 분석</h1>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('text', this)">
      <span class="icon">✏️</span>직접 입력
    </button>
    <button class="tab-btn" onclick="switchTab('file', this)">
      <span class="icon">📄</span>파일 첨부
    </button>
    <button class="tab-btn" onclick="switchTab('camera', this)">
      <span class="icon">📷</span>촬영
    </button>
  </div>

  <!-- 텍스트 입력 -->
  <div class="panel active" id="panel-text">
    <div class="panel-title">검사결과 · 복용약 · 병력 입력</div>
    <textarea id="textInput" placeholder="예) INR 2.8, PLT 80000, aspirin, DM, warfarin"></textarea>
    <div class="example-chips">
      <button class="chip" onclick="appendChip('INR 2.5')">INR 2.5</button>
      <button class="chip" onclick="appendChip('PLT 80000')">PLT 80k</button>
      <button class="chip" onclick="appendChip('aspirin')">Aspirin</button>
      <button class="chip" onclick="appendChip('warfarin')">Warfarin</button>
      <button class="chip" onclick="appendChip('DM')">DM</button>
      <button class="chip" onclick="appendChip('stent')">Stent</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary" onclick="runText()">분석 시작</button>
  </div>

  <!-- 파일 첨부 -->
  <div class="panel" id="panel-file">
    <div class="panel-title">검사결과지 이미지 · PDF 첨부</div>
    <div class="file-drop" id="fileDrop">
      <input type="file" id="fileInput" accept="image/*,.pdf" onchange="onFileSelect(this)">
      <div class="file-icon">📂</div>
      <div class="file-drop-text">파일을 선택하거나 여기에 드래그</div>
      <div class="file-drop-sub">JPG, PNG, PDF 지원</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary" id="fileAnalyzeBtn" onclick="runFile()" disabled>분석 시작</button>
  </div>

  <!-- 카메라 촬영 -->
  <div class="panel" id="panel-camera">
    <div class="panel-title">검사결과지 촬영</div>
    <div class="camera-area">
      <video id="video" autoplay playsinline></video>
      <div class="camera-placeholder" id="cameraPlaceholder" style="display:none;">
        <div class="cam-icon">📷</div>
        <span>카메라를 시작해주세요</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="startCamera()">카메라 시작</button>
      <button class="btn btn-primary" onclick="capture()">촬영 및 분석</button>
    </div>
  </div>

  <!-- 진행 상태 -->
  <div class="progress-wrap" id="progress">
    <div class="spinner"></div>
    <div class="progress-text" id="progressText">분석 중...</div>
  </div>

  <!-- 결과 카드 -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="risk-badge" id="riskBadge">—</span>
      <span class="result-title" id="riskTitle">—</span>
    </div>
    <div class="result-body">
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-label">시술</div>
          <div class="stat-value" id="statProcedure">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">약물 조절</div>
          <div class="stat-value" id="statDrug">—</div>
        </div>
      </div>
      <div class="notes-section">
        <div class="notes-label">주의사항</div>
        <div id="notesList"></div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetResult()">초기화</button>
  </div>
</div>

<script>
let camStream = null;

function switchTab(id, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
  if (id === 'camera') startCamera();
  else stopCamera();
}

function startCamera() {
  const ph = document.getElementById('cameraPlaceholder');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      camStream = stream;
      const v = document.getElementById('video');
      v.srcObject = stream;
      v.style.display = 'block';
      if (ph) ph.style.display = 'none';
    })
    .catch(() => {
      if (ph) ph.style.display = 'flex';
    });
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
}

function appendChip(val) {
  const ta = document.getElementById('textInput');
  ta.value = ta.value ? ta.value + ', ' + val : val;
  ta.focus();
}

function onFileSelect(input) {
  const file = input.files[0];
  const drop = document.getElementById('fileDrop');
  const nameEl = document.getElementById('fileName');
  const btn = document.getElementById('fileAnalyzeBtn');
  if (file) {
    drop.classList.add('has-file');
    nameEl.textContent = file.name;
    btn.disabled = false;
  }
}

function showProgress(msg) {
  const p = document.getElementById('progress');
  p.classList.add('show');
  document.getElementById('progressText').textContent = msg || '분석 중...';
}

function hideProgress() {
  document.getElementById('progress').classList.remove('show');
}

function extract(text, regex) {
  const m = text.match(regex);
  return m ? parseFloat(m[1]) : null;
}

function analyze(text) {
  text = text.toLowerCase();
  const inr = extract(text, /inr[^0-9]*([0-9.]+)/i);
  const plt = extract(text, /(?:plt|platelet)[^0-9]*([0-9]+)/i);
  const wbc = extract(text, /wbc[^0-9]*([0-9]+)/i);

  let bleeding = '낮음', procedure = '가능', drugAdj = '없음';
  const notes = [];

  if (inr && inr > 3.5) { bleeding = '높음'; procedure = '연기'; notes.push('INR ' + inr + ' — 출혈 위험 매우 높음'); }
  else if (inr && inr > 3.0) { bleeding = '중등도'; notes.push('INR ' + inr + ' — 지혈 주의 필요'); }
  else if (inr) { notes.push('INR ' + inr + ' — 정상 범위'); }

  if (plt && plt < 50000) { bleeding = '높음'; procedure = '연기'; notes.push('혈소판 ' + plt.toLocaleString() + ' — 심각한 혈소판 감소'); }
  else if (plt && plt < 100000) { bleeding = bleeding === '높음' ? '높음' : '중등도'; notes.push('혈소판 ' + plt.toLocaleString() + ' — 지혈 처치 필요'); }

  if (wbc && wbc < 2000) { procedure = '연기'; notes.push('WBC ' + wbc.toLocaleString() + ' — 감염 위험 높음'); }

  if (text.includes('aspirin')) notes.push('아스피린: 항혈소판 효과 유지 — 지혈 주의');
  if (text.includes('plavix') || text.includes('clopidogrel')) notes.push('클로피도그렐: 이중 항혈소판 위험');
  if (text.includes('warfarin')) { drugAdj = 'INR 기준 판단'; notes.push('와파린 복용 중 — INR 수치 필수 확인'); }
  if (text.includes('apixaban') || text.includes('rivaroxaban') || text.includes('dabigatran')) {
    drugAdj = '타이밍 조절'; notes.push('NOAC 복용 중 — 마지막 복용 12–24h 후 시술');
  }
  if (text.includes('dm') || text.includes('diabetes') || text.includes('당뇨')) notes.push('당뇨: 감염 위험 증가, 혈당 조절 확인');
  if (text.includes('stent') || text.includes('mi') || text.includes('심근경색')) notes.push('심혈관 시술력 — 항혈소판제 중단 위험 주의');
  if (text.includes('ckd') || text.includes('신부전') || text.includes('dialysis')) notes.push('신장 기능 저하 — 약물 대사 고려');
  if (text.includes('liver') || text.includes('간경화') || text.includes('cirrhosis')) notes.push('간 기능 저하 — 응고인자 생성 감소 가능');

  renderResult(bleeding, procedure, drugAdj, notes);
}

function renderResult(bleeding, procedure, drugAdj, notes) {
  hideProgress();
  const card = document.getElementById('resultCard');
  const badge = document.getElementById('riskBadge');
  const title = document.getElementById('riskTitle');
  const proc = document.getElementById('statProcedure');
  const drug = document.getElementById('statDrug');
  const list = document.getElementById('notesList');

  const riskMap = {
    '높음': { cls: 'risk-high', label: '고위험', titleText: '출혈 고위험 — 시술 재검토 필요' },
    '중등도': { cls: 'risk-mid', label: '중등도', titleText: '중등도 위험 — 주의하여 진행' },
    '낮음': { cls: 'risk-low', label: '저위험', titleText: '출혈 위험 낮음 — 진행 가능' },
  };

  const risk = riskMap[bleeding] || riskMap['낮음'];
  badge.className = 'risk-badge ' + risk.cls;
  badge.textContent = risk.label;
  title.textContent = risk.titleText;

  const procColor = procedure === '연기' ? 'text-danger' : 'text-success';
  proc.className = 'stat-value ' + procColor;
  proc.textContent = procedure;

  const drugColor = drugAdj !== '없음' ? 'text-warning' : 'text-success';
  drug.className = 'stat-value ' + drugColor;
  drug.textContent = drugAdj;

  if (notes.length === 0) {
    list.innerHTML = '<div class="no-notes">특이사항 없음</div>';
  } else {
    list.innerHTML = notes.map(n =>
      `<div class="note-item"><div class="note-dot"></div><span>${n}</span></div>`
    ).join('');
  }

  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function runText() {
  const val = document.getElementById('textInput').value.trim();
  if (!val) { alert('정보를 입력해주세요.'); return; }
  showProgress('분석 중...');
  setTimeout(() => analyze(val), 100);
}

function runFile() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert('파일을 선택해주세요.'); return; }
  showProgress('OCR 처리 중...');
  Tesseract.recognize(file, 'eng+kor', {
    logger: m => {
      if (m.status === 'recognizing text')
        document.getElementById('progressText').textContent = 'OCR 인식 중 ' + Math.round(m.progress * 100) + '%';
    }
  }).then(({ data: { text } }) => analyze(text));
}

function capture() {
  const video = document.getElementById('video');
  if (!video.srcObject) { alert('카메라를 먼저 시작해주세요.'); return; }
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  showProgress('촬영 이미지 분석 중...');
  Tesseract.recognize(canvas, 'eng+kor', {
    logger: m => {
      if (m.status === 'recognizing text')
        document.getElementById('progressText').textContent = 'OCR 인식 중 ' + Math.round(m.progress * 100) + '%';
    }
  }).then(({ data: { text } }) => analyze(text));
}

function resetResult() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('textInput').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('fileName').textContent = '';
  document.getElementById('fileDrop').classList.remove('has-file');
  document.getElementById('fileAnalyzeBtn').disabled = true;
}
</script>
</body>
</html>
